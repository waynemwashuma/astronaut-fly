<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astronaut Fly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #050507;
      --bg-panel: rgba(8, 8, 14, 0.86);
      --text-main: #f7f7ff;
      --text-dim: #a7aed7;
      --blue: #2a7fff;
      --purple: #8a2eff;
      --line: rgba(119, 130, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(1200px 700px at 110% -10%, rgba(42, 127, 255, 0.23), transparent 65%),
        radial-gradient(900px 540px at -20% 100%, rgba(138, 46, 255, 0.2), transparent 60%),
        linear-gradient(135deg, #030306, #07070d 38%, #050508 100%);
      color: var(--text-main);
      font-family: "Space Grotesk", sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 20px;
    }

    body::after {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: transparent;
      box-shadow:
        -43vw -29vh #ffffff, -36vw -14vh #8a2eff, -28vw 18vh #9ac4ff, -19vw -8vh #ffffff, -10vw 27vh #4b90ff,
        -2vw -33vh #d4c2ff, 6vw -11vh #ffffff, 14vw -27vh #72a7ff, 19vw 20vh #ffffff, 27vw -4vh #9f7eff,
        33vw 25vh #ffffff, 39vw -20vh #8a2eff, 45vw 7vh #9ec5ff, -47vw 9vh #ffffff, -30vw 34vh #6ea3ff,
        -17vw 32vh #ffffff, 1vw 35vh #c4d9ff, 23vw 33vh #9f7eff, 40vw 33vh #ffffff, -8vw 4vh #ffffff;
      animation: twinkleA 2.8s infinite ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 8% 14%, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 73%, rgba(144, 175, 255, 0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 41% 34%, rgba(188, 149, 255, 0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 64% 19%, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 76% 67%, rgba(136, 174, 255, 0.82) 0 1px, transparent 2px),
        radial-gradient(circle at 91% 38%, rgba(193, 157, 255, 0.82) 0 1px, transparent 2px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      pointer-events: none;
      animation: twinkleB 4.2s infinite ease-in-out;
      z-index: 0;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(6px);
      padding: clamp(24px, 5vw, 46px);
      box-shadow:
        0 24px 55px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(138, 46, 255, 0.22) inset;
      animation: rise 650ms ease-out forwards;
      opacity: 0;
      transform: translateY(16px);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 0 0 12px;
      animation: fadeIn 850ms 120ms both;
    }

    h1 {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 7vw, 4.1rem);
      line-height: 1.02;
      text-transform: uppercase;
      text-wrap: balance;
      animation: fadeIn 900ms 220ms both;
    }

    h1 .accent-blue {
      color: var(--blue);
    }

    h1 .accent-purple {
      color: var(--purple);
    }

    .subtitle {
      margin: 16px 0 30px;
      color: var(--text-dim);
      font-size: clamp(1rem, 2.4vw, 1.16rem);
      max-width: 50ch;
      margin-left: auto;
      margin-right: auto;
      animation: fadeIn 900ms 330ms both;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.07em;
      color: #fff;
      border: 1px solid rgba(168, 189, 255, 0.45);
      background: linear-gradient(95deg, #121225 0%, #16244d 45%, #3a1a67 100%);
      transition: transform 180ms ease, box-shadow 220ms ease, border-color 220ms ease;
      animation: fadeIn 950ms 450ms both;
      margin-left: auto;
      margin-right: auto;
    }

    .play-btn:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(183, 165, 255, 0.8);
    }

    .play-btn:active {
      transform: translateY(0);
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes twinkleA {
      0% {
        opacity: 0.45;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.18);
      }

      100% {
        opacity: 0.45;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes twinkleB {
      0% {
        opacity: 0.55;
      }

      50% {
        opacity: 0.9;
      }

      100% {
        opacity: 0.55;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .panel {
        border-radius: 16px;
      }

      .play-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="eyebrow">Arcade Flight Prototype</p>
    <h1><span class="accent-blue">Astronaut</span> <span class="accent-purple">Fly</span></h1>
    <p class="subtitle">Launch into orbit, collect powerups, and survive the fall. Black-space base with neon pulse controls.</p>
    <a href="./game.html" class="play-btn">Play Game</a>
  </main>
</body>
</html>
